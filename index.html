<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent-Teacher Scheduler</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>📅 PT Scheduler</h1>
    <p>Book a 10-minute slot with your child's teacher</p>

    <div class="role-tabs">
      <button class="role-tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
      <button class="role-tab" id="tab-register" onclick="showTab('register')">Register</button>
    </div>

    <!-- Login form -->
    <div id="form-login">
      <div id="login-alert" class="alert alert-error hidden"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
    </div>

    <!-- Register form -->
    <div id="form-register" class="hidden">
      <div id="reg-alert" class="alert hidden"></div>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="reg-name" placeholder="Full name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" />
      </div>
      <div class="form-group">
        <label>Child's Name</label>
        <input type="text" id="reg-child" placeholder="Child's full name" />
      </div>
      <div class="form-group">
        <label>Child's Class</label>
        <select id="reg-class">
          <option value="">Loading classes...</option>
        </select>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // Redirect if already logged in
  App.getCurrentUser().then(u => {
    if (u) window.location.href = u.role === 'admin' ? 'admin.html' : 'dashboard.html';
  });

  // Load classes for register dropdown (public endpoint)
  fetch('/api/teachers/classes').then(r => r.json()).then(classes => {
    const sel = document.getElementById('reg-class');
    sel.innerHTML = '<option value="">Select class</option>';
    classes.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c; sel.appendChild(o);
    });
  }).catch(() => {
    document.getElementById('reg-class').innerHTML = '<option value="">Select class</option>';
  });

  function showTab(tab) {
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  async function doLogin() {
    const email   = document.getElementById('login-email').value.trim();
    const pass    = document.getElementById('login-password').value;
    const alertEl = document.getElementById('login-alert');
    const user    = await App.login(email, pass);
    if (!user) {
      alertEl.textContent = 'Invalid email or password.';
      alertEl.classList.remove('hidden');
      return;
    }
    window.location.href = user.role === 'admin' ? 'admin.html' : 'dashboard.html';
  }

  async function doRegister() {
    const name    = document.getElementById('reg-name').value.trim();
    const email   = document.getElementById('reg-email').value.trim();
    const pass    = document.getElementById('reg-password').value;
    const child   = document.getElementById('reg-child').value.trim();
    const cls     = document.getElementById('reg-class').value;
    const alertEl = document.getElementById('reg-alert');

    if (!name || !email || !pass || !child || !cls) {
      alertEl.textContent = 'Please fill in all fields.';
      alertEl.className = 'alert alert-error';
      alertEl.classList.remove('hidden');
      return;
    }
    if (pass.length < 6) {
      alertEl.textContent = 'Password must be at least 6 characters.';
      alertEl.className = 'alert alert-error';
      alertEl.classList.remove('hidden');
      return;
    }
    const res = await App.registerParent(name, email, pass, child, cls);
    if (!res.ok) {
      alertEl.textContent = res.msg;
      alertEl.className = 'alert alert-error';
      alertEl.classList.remove('hidden');
      return;
    }
    alertEl.textContent = 'Account created! Please sign in.';
    alertEl.className = 'alert alert-success';
    alertEl.classList.remove('hidden');
    setTimeout(() => showTab('login'), 1500);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
